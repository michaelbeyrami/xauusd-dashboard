<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AURUM AI Test</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#0a0a0f] text-white p-8">

<div class="max-w-2xl mx-auto">
  <h1 class="text-4xl font-bold mb-8">Gemini AI Test</h1>
  
  <button onclick="testGemini()" class="bg-blue-600 hover:bg-blue-500 px-8 py-4 rounded-2xl text-lg">
    Test Gemini Connection
  </button>

  <div id="result" class="mt-8 p-6 bg-gray-900 rounded-2xl min-h-[200px]"></div>
</div>

<script>
const GEMINI_KEY = "AIzaSyDFimtYXHRgIMAmxsNAtfUdnf40jGmMDVQ";

async function testGemini() {
  const result = document.getElementById('result');
  result.innerHTML = "<p class='text-yellow-400'>Testing connection...</p>";

  try {
    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: "Say hello and confirm you are working." }] }]
      })
    });

    const data = await response.json();
    console.log(data);

    if (data.candidates) {
      result.innerHTML = `<p class='text-green-400'>✅ Gemini is working!<br><br>${data.candidates[0].content.parts[0].text}</p>`;
    } else {
      result.innerHTML = `<p class='text-red-400'>Error: ${JSON.stringify(data)}</p>`;
    }
  } catch (err) {
    result.innerHTML = `<p class='text-red-400'>Connection Failed<br>${err.message}</p>`;
  }
}
</script>
</body>
</html>
