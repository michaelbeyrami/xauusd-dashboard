<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AURUM • Market Intelligence</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; background: #0a0a0f; color: #e5e5e5; }
    .title-font { font-family: 'Space Grotesk', sans-serif; }
    .card { background: #111118; border: 1px solid #3a3a44; border-radius: 20px; }
    .gold { color: #fbbf24; }
    .green { color: #22c55e; }
    .red { color: #ef4444; }
    .session-active { background: linear-gradient(145deg, #052e16, #14532d); border-color: #4ade80; }
  </style>
</head>
<body class="min-h-screen p-6">

<div class="max-w-screen-2xl mx-auto">

  <!-- Instrument Selector -->
  <div class="flex gap-3 mb-8 flex-wrap">
    <button onclick="switchInstrument(0)" class="px-6 py-3 rounded-2xl bg-amber-400 text-black font-semibold">XAUUSD Gold</button>
    <button onclick="switchInstrument(1)" class="px-6 py-3 rounded-2xl hover:bg-amber-400/20">XAGUSD Silver</button>
    <button onclick="switchInstrument(2)" class="px-6 py-3 rounded-2xl hover:bg-amber-400/20">NAS100</button>
    <button onclick="switchInstrument(3)" class="px-6 py-3 rounded-2xl hover:bg-amber-400/20">SPX500</button>
  </div>

  <!-- Header -->
  <div class="flex justify-between items-start mb-10">
    <div>
      <h1 id="symbol-title" class="text-5xl font-bold title-font gold">XAUUSD</h1>
      <p class="text-gray-400">Professional Market Intelligence</p>
    </div>
    <div class="text-right">
      <div id="price" class="text-7xl font-mono font-bold">4565.28</div>
      <div id="change" class="text-3xl green">+33.16 (+0.73%)</div>
      <div class="text-sm text-gray-400 font-mono" id="time"></div>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">

    <!-- Main Chart -->
    <div class="lg:col-span-8">
      <div class="card p-6">
        <div id="main-chart" class="h-[520px] rounded-2xl overflow-hidden"></div>
      </div>
    </div>

    <!-- AI Bias -->
    <div class="lg:col-span-4 space-y-6">
      <div class="card p-6">
        <div class="flex justify-between mb-4">
          <h3 class="flex items-center gap-2 text-lg title-font"><i class="fas fa-brain gold"></i> DAILY AI BIAS</h3>
          <button onclick="refreshAIAnalysis()" class="px-4 py-2 bg-amber-400 hover:bg-amber-300 text-black text-sm rounded-xl flex items-center gap-2">
            <i class="fas fa-sync"></i> Refresh AI
          </button>
        </div>
        <div id="bias" class="text-5xl font-bold green">BULLISH</div>
        <div id="confidence" class="text-gray-400">Confidence 84%</div>
        <div id="bias-reason" class="mt-6 text-sm leading-relaxed text-gray-300 min-h-[180px]"></div>
      </div>

      <div class="card p-6">
        <h3 class="text-amber-400 mb-4">KEY LEVELS</h3>
        <div class="grid grid-cols-2 gap-8 text-sm">
          <div><div class="text-xs text-gray-400 mb-2">SUPPORT</div><div id="support-levels" class="space-y-1 green font-mono"></div></div>
          <div><div class="text-xs text-gray-400 mb-2">RESISTANCE</div><div id="resistance-levels" class="space-y-1 red font-mono"></div></div>
        </div>
      </div>
    </div>

    <!-- Sessions -->
    <div class="lg:col-span-12">
      <div class="card p-6">
        <h3 class="text-amber-400 mb-4 flex items-center gap-2"><i class="fas fa-globe"></i> GLOBAL MARKET SESSIONS</h3>
        <div id="sessions" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
      </div>
    </div>

    <!-- News -->
    <div class="lg:col-span-12 grid grid-cols-1 lg:grid-cols-2 gap-6">
      <div class="card p-6">
        <h3 class="text-amber-400 mb-4 flex items-center gap-2"><i class="fas fa-newspaper"></i> LIVE NEWS</h3>
        <div id="newsfeed" class="space-y-4 max-h-[380px] overflow-auto"></div>
      </div>
      <div class="card p-6">
        <h3 class="text-amber-400 mb-4 flex items-center gap-2"><i class="fas fa-bolt"></i> BREAKING NEWS</h3>
        <div id="breaking" class="space-y-4 max-h-[380px] overflow-auto"></div>
      </div>
    </div>

    <!-- Calendar -->
    <div class="lg:col-span-12">
      <div class="card p-6">
        <h3 class="text-amber-400 mb-4 flex items-center gap-2"><i class="fas fa-calendar-alt"></i> HIGH IMPACT CALENDAR</h3>
        <div id="calendar" class="space-y-3"></div>
      </div>
    </div>
  </div>
</div>

<script>
// === YOUR KEYS ===
const GEMINI_KEY = "AIzaSyDFimtYXHRgIMAmxsNAtfUdnf40jGmMDVQ";
const FINNHUB_KEY = "d23etp9r01qgiro3eeqgd23etp9r01qgiro3eer0";
const GNEWS_KEY = "22ae6116d9e32da730253c4d11a08735";

const instruments = [
  { name: "XAUUSD", symbol: "FX_IDC:XAUUSD", bias: "BULLISH", confidence: "84%", reason: "Loading AI analysis..." },
  { name: "XAGUSD", symbol: "FX_IDC:XAGUSD", bias: "BULLISH", confidence: "77%", reason: "Loading AI analysis..." },
  { name: "NAS100", symbol: "NASDAQ", bias: "NEUTRAL", confidence: "65%", reason: "Loading AI analysis..." },
  { name: "SPX500", symbol: "SPX500", bias: "SLIGHTLY BULLISH", confidence: "72%", reason: "Loading AI analysis..." }
];

let current = 0;

window.switchInstrument = function(i) {
  current = i;
  const inst = instruments[i];
  document.getElementById('symbol-title').textContent = inst.name;
  document.getElementById('bias').innerHTML = `<span class="green">${inst.bias}</span>`;
  document.getElementById('confidence').textContent = `Confidence ${inst.confidence}%`;
  document.getElementById('bias-reason').innerHTML = `<p class="leading-relaxed">${inst.reason}</p>`;

  document.getElementById('main-chart').innerHTML = `<iframe src="https://www.tradingview.com/widgetembed/?symbol=${inst.symbol}&interval=15&theme=dark&style=1" width="100%" height="520" frameborder="0" allowfullscreen></iframe>`;
};

async function refreshAIAnalysis() {
  const inst = instruments[current];
  const loading = "Analyzing current market conditions with Gemini AI...";
  document.getElementById('bias-reason').innerHTML = `<p class="text-gray-400">${loading}</p>`;

  try {
    const prompt = `You are a professional gold trader and macro analyst. Give a detailed daily bias for ${inst.name}. Include technical levels, fundamental drivers, and geopolitical factors. Be insightful and balanced.`;

    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    });

    const data = await response.json();
    const analysis = data.candidates[0].content.parts[0].text;

    document.getElementById('bias-reason').innerHTML = `<p class="leading-relaxed">${analysis}</p>`;
  } catch (e) {
    document.getElementById('bias-reason').innerHTML = `<p class="text-red-400">Failed to connect to Gemini. Check your API key or internet.</p>`;
  }
}

// Sessions, Price, etc.
function updateSessions() { /* ... same as before */ }
async function updatePrice() { /* ... */ }

// Init
switchInstrument(0);
updatePrice();
updateSessions();
refreshAIAnalysis();   // Initial AI analysis

setInterval(updatePrice, 15000);
setInterval(updateSessions, 60000);
</script>
</body>
</html>
