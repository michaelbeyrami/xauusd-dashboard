<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AURUM • Market Intelligence</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; background: #0a0a0f; color: #e5e5e5; }
    .title-font { font-family: 'Space Grotesk', sans-serif; }
    .card { background: #111118; border: 1px solid #3a3a44; border-radius: 20px; }
    .gold { color: #fbbf24; }
  </style>
</head>
<body class="min-h-screen p-6">

<div class="max-w-screen-2xl mx-auto">

  <div class="flex gap-3 mb-8 flex-wrap">
    <button onclick="switchInstrument(0)" class="px-6 py-3 rounded-2xl bg-amber-400 text-black font-semibold">XAUUSD Gold</button>
    <button onclick="switchInstrument(1)" class="px-6 py-3 rounded-2xl hover:bg-amber-400/20">XAGUSD Silver</button>
    <button onclick="switchInstrument(2)" class="px-6 py-3 rounded-2xl hover:bg-amber-400/20">NAS100</button>
    <button onclick="switchInstrument(3)" class="px-6 py-3 rounded-2xl hover:bg-amber-400/20">SPX500</button>
  </div>

  <div class="flex justify-between items-start mb-10">
    <div>
      <h1 id="symbol-title" class="text-5xl font-bold title-font gold">XAUUSD</h1>
      <p class="text-gray-400">Real-Time Market Intelligence</p>
    </div>
    <div class="text-right">
      <div id="price" class="text-7xl font-mono font-bold">Loading...</div>
      <div id="change" class="text-3xl green"></div>
      <div class="text-sm text-gray-400 font-mono" id="time"></div>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">

    <div class="lg:col-span-8">
      <div class="card p-6">
        <div id="main-chart" class="h-[520px] rounded-2xl overflow-hidden"></div>
      </div>
    </div>

    <div class="lg:col-span-4">
      <div class="card p-6">
        <h3 class="flex items-center gap-2 text-lg mb-4 title-font"><i class="fas fa-brain gold"></i> DAILY AI BIAS</h3>
        <div id="bias" class="text-5xl font-bold green">BULLISH</div>
        <div id="bias-reason" class="mt-6 text-sm leading-relaxed text-gray-300"></div>
      </div>
    </div>
  </div>
</div>

<script>
// Real APIs - No Mock Data
const TWELVE_KEY = "5a11bff6fe454c20a48452d2436ce6eb";
const FMP_KEY = "zwrV7PMnFiQGmnnbwiGreHTWGs1YPutp";

const instruments = [
  { name: "XAUUSD", symbol: "FX_IDC:XAUUSD", priceSymbol: "XAU/USD" },
  { name: "XAGUSD", symbol: "FX_IDC:XAGUSD", priceSymbol: "XAG/USD" },
  { name: "NAS100", symbol: "NASDAQ", priceSymbol: "IXIC" },
  { name: "SPX500", symbol: "SPX500", priceSymbol: "SPX" }
];

let current = 0;

window.switchInstrument = function(i) {
  current = i;
  const inst = instruments[i];
  document.getElementById('symbol-title').textContent = inst.name;
  document.getElementById('main-chart').innerHTML = `
    <iframe src="https://www.tradingview.com/widgetembed/?symbol=${inst.symbol}&interval=15&theme=dark&style=1" 
            width="100%" height="520" frameborder="0" allowfullscreen></iframe>`;
  updatePrice();
};

async function updatePrice() {
  const inst = instruments[current];
  document.getElementById('price').textContent = "Loading...";

  try {
    // Try Twelve Data first for gold
    const res = await fetch(`https://api.twelvedata.com/price?symbol=${inst.priceSymbol}&apikey=${TWELVE_KEY}`);
    const data = await res.json();
    if (data.price) {
      document.getElementById('price').textContent = parseFloat(data.price).toFixed(2);
    }
  } catch(e) {
    document.getElementById('price').textContent = "Error loading price";
  }
}

// Init
switchInstrument(0);

setInterval(updatePrice, 15000);

setInterval(() => {
  document.getElementById('time').textContent = new Date().toLocaleTimeString('en-US', {timeZone: 'UTC'}) + " UTC";
}, 1000);
</script>
</body>
</html>
