<body class="min-h-screen p-6">

  <div class="flex gap-3 mb-8 flex-wrap">

      <p class="text-gray-400">Professional Market Intelligence</p>
    </div>
    <div class="text-right">
      <div id="price" class="text-7xl font-mono font-bold">4565.28</div>
      <div id="change" class="text-3xl green">+33.16 (+0.73%)</div>
      <div class="text-sm text-gray-400 font-mono" id="time"></div>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">

    <!-- Chart -->

        <div class="flex justify-between items-center mb-4">
          <h3 class="flex items-center gap-2 text-lg title-font"><i class="fas fa-brain gold"></i> DAILY AI BIAS</h3>
          <button onclick="refreshAIAnalysis()" class="text-xs bg-amber-400 text-black px-4 py-1.5 rounded-xl hover:bg-amber-300">
            <i class="fas fa-sync"></i> Refresh Analysis
          </button>
        </div>
        <div id="bias" class="text-5xl font-bold green">BULLISH</div>
        <div id="confidence" class="text-gray-400">Confidence 84%</div>
        <div id="bias-reason" class="mt-6 text-sm leading-relaxed text-gray-300"></div>
      </div>

      <div class="card p-6">
        <h3 class="text-amber-400 mb-4">KEY LEVELS</h3>
        <div class="grid grid-cols-2 gap-8 text-sm">
          <div><div class="text-xs text-gray-400 mb-2">SUPPORT</div><div id="support-levels" class="space-y-1 green font-mono"></div></div>
          <div><div class="text-xs text-gray-400 mb-2">RESISTANCE</div><div id="resistance-levels" class="space-y-1 red font-mono"></div></div>
        </div>
      </div>
    </div>

// Refresh AI Analysis using Gemini
async function refreshAIAnalysis() {
  const inst = instruments[current];
  const loadingText = "Analyzing market conditions with AI...";
  document.getElementById('bias-reason').innerHTML = `<p class="text-gray-400">${loadingText}</p>`;

  try {
    const prompt = `You are a professional gold and market analyst. Current instrument: ${inst.name}.
Write a detailed, insightful daily bias analysis (2-3 paragraphs). Include technical, fundamental, and geopolitical factors.`;

    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }]
      })
    });

    const data = await res.json();
    const analysis = data.candidates[0].content.parts[0].text;

    document.getElementById('bias-reason').innerHTML = `<p class="leading-relaxed">${analysis}</p>`;
  } catch(e) {
    document.getElementById('bias-reason').innerHTML = `<p class="text-red-400">Failed to get AI analysis. Check your Gemini key.</p>`;
  }
}
