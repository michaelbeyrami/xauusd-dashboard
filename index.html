<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini Test</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0a0a0f] text-white p-8">

<div class="max-w-xl mx-auto">
  <h1 class="text-3xl font-bold mb-6">Gemini API Test</h1>
  
  <button onclick="testGemini()" 
          class="bg-blue-600 hover:bg-blue-500 px-8 py-4 rounded-2xl text-lg font-medium">
    Test My Gemini Key
  </button>

  <div id="result" class="mt-8 p-6 bg-gray-900 rounded-2xl text-sm"></div>
</div>

<script>
const GEMINI_KEY = "AIzaSyDFimtYXHRgIMAmxsNAtfUdnf40jGmMDVQ";

async function testGemini() {
  const resultDiv = document.getElementById('result');
  resultDiv.innerHTML = `<p class="text-yellow-400">Sending request to Gemini...</p>`;

  try {
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ parts: [{ text: "Say 'Hello, I am working' if you can read this." }] }]
        })
      }
    );

    const data = await response.json();
    console.log("Full Response:", data);

    if (data.candidates && data.candidates[0]) {
      const text = data.candidates[0].content.parts[0].text;
      resultDiv.innerHTML = `<p class="text-green-400">✅ Success!<br><br>${text}</p>`;
    } else if (data.error) {
      resultDiv.innerHTML = `<p class="text-red-400">Error: ${data.error.message}</p>`;
    } else {
      resultDiv.innerHTML = `<p class="text-red-400">Invalid Response Format</p>`;
    }
  } catch (err) {
    resultDiv.innerHTML = `<p class="text-red-400">Network Error: ${err.message}</p>`;
  }
}
</script>
</body>
</html>
